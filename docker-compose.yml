version: "3.9"

# Frontend is served by Cloudflare Pages (not a local container).
# This compose file runs: PostgreSQL + Django API + cloudflared tunnel.

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clinictraq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: clinictraq
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
