version: "3.9"

# Frontend is served by Cloudflare Pages.
# This compose file runs: PostgreSQL + Redis + Django API (gunicorn) + Celery worker + nginx.

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: clinictraq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: clinictraq
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && gunicorn clinictraq.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A clinictraq worker -l info --concurrency 4
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
