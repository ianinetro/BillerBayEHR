<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BillerBay MVP Full Flow Mock-up</title>
<style>
:root{
  --ink:#12122C;--blue:#0410BD;--vivid:#3F4CFF;--teal:#007998;--cyan:#00CBDE;
  --slate:#676687;--app:#F2F2F8;--lav:#EFF0FF;--info:#D9FCFF;--border:#E3E3F1;--border2:#BABACE;--white:#fff;
  --success-bg:#ECFDF5;--success-text:#047857;--warn-bg:#FFFBEB;--warn-text:#B45309;--danger-bg:#FEF2F2;--danger-text:#B91C1C;
  --shadow:0 1px 2px rgba(18,18,44,.06);--shadow-lg:0 20px 40px rgba(18,18,44,.14);
}
*{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--app);color:var(--ink);font-size:14px;font-variant-numeric:tabular-nums} button,input,select,textarea{font:inherit} button{cursor:pointer}
.topbar{height:56px;background:var(--ink);color:#fff;display:flex;align-items:center;padding:0 18px;gap:16px;position:sticky;top:0;z-index:10}.brand{font-weight:750;font-size:18px;letter-spacing:.2px}.workspace{padding:7px 10px;border:1px solid rgba(255,255,255,.18);border-radius:8px;color:rgba(255,255,255,.88);font-size:12px}.search{margin-left:auto;min-width:360px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;color:#fff;padding:9px 12px}.search::placeholder{color:rgba(255,255,255,.65)}.topbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:white;border-radius:7px;padding:8px 10px}.shell{display:flex;min-height:calc(100vh - 56px)}.side{width:248px;background:#fff;border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:56px;height:calc(100vh - 56px)}.side small{display:block;color:var(--slate);font-size:11px;font-weight:700;text-transform:uppercase;margin:14px 10px 7px}.nav{display:flex;align-items:center;gap:10px;width:100%;height:40px;border:0;border-radius:8px;background:transparent;color:var(--ink);padding:0 10px;font-weight:650;text-align:left}.nav.active{background:var(--lav);color:var(--blue);box-shadow:inset 3px 0 0 var(--blue)}.nav:hover{background:var(--app)}.main{flex:1;padding:28px 32px 42px;min-width:0}.header{display:flex;gap:24px;justify-content:space-between;align-items:flex-start;margin-bottom:20px}.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--slate);letter-spacing:.04em}.title{font-size:24px;line-height:32px;font-weight:700;margin:2px 0 3px}.desc{color:var(--slate);line-height:21px;max-width:850px}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--border2);background:#fff;color:var(--ink);border-radius:7px;height:36px;padding:0 12px;font-weight:650}.btn.primary{background:var(--blue);border-color:var(--blue);color:white}.btn.ghost{border-color:transparent;background:transparent}.btn.danger{background:var(--danger-bg);border-color:#FECACA;color:var(--danger-text)}.btn:hover{box-shadow:0 0 0 3px rgba(63,76,255,.12)}.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(5,minmax(160px,1fr))}.card{background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow)}.card.pad{padding:16px}.kpi .label{font-size:11px;color:var(--slate);text-transform:uppercase;font-weight:750}.kpi .value{font-size:30px;font-weight:760;margin-top:6px}.kpi .hint{font-size:12px;color:var(--slate);margin-top:3px}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:#fff}.toolbar .left,.toolbar .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.input,select,textarea{height:36px;border:1px solid var(--border2);border-radius:5px;background:#fff;color:var(--ink);padding:0 10px;min-width:150px}.input:focus,select:focus,textarea:focus{outline:none;border-color:var(--vivid);box-shadow:0 0 0 3px rgba(63,76,255,.16)}textarea{height:auto;padding:10px}.tablewrap{overflow:auto}.table{width:100%;border-collapse:separate;border-spacing:0}.table th{height:38px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--slate);font-weight:750;background:var(--app);border-bottom:1px solid var(--border);padding:0 12px;white-space:nowrap}.table td{height:46px;border-bottom:1px solid var(--border);padding:0 12px;white-space:nowrap;vertical-align:middle}.table tr:hover td{background:#FAFAFE}.table tr.clickable{cursor:pointer}.right{text-align:right}.muted{color:var(--slate)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}.badge{display:inline-flex;align-items:center;border-radius:5px;height:22px;padding:0 8px;font-size:11px;font-weight:750;border:1px solid transparent}.success{background:var(--success-bg);color:var(--success-text);border-color:#A7F3D0}.warn{background:var(--warn-bg);color:var(--warn-text);border-color:#FDE68A}.dangerB{background:var(--danger-bg);color:var(--danger-text);border-color:#FECACA}.infoB{background:var(--info);color:var(--teal);border-color:#94F2FA}.neutral{background:var(--app);color:var(--slate);border-color:var(--border)}.blueB{background:var(--lav);color:var(--blue);border-color:#A2A8FF}.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);background:#fff;padding:0 12px}.tab{height:42px;background:transparent;border:0;border-bottom:2px solid transparent;padding:0 12px;font-weight:700;color:var(--slate)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}.two{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.fieldgrid{display:grid;grid-template-columns:repeat(3,minmax(180px,1fr));gap:14px}.field label{font-size:11px;text-transform:uppercase;font-weight:750;color:var(--slate);display:block;margin-bottom:5px}.field .value,.fakeinput{min-height:36px;border:1px solid var(--border);border-radius:5px;padding:9px 10px;background:#fff}.summary{position:sticky;top:74px;height:max-content}.sectionTitle{font-size:17px;font-weight:750;margin:0 0 4px}.sub{font-size:13px;color:var(--slate);line-height:19px}.divider{border-top:1px solid var(--border);margin:14px 0}.timeline{display:grid;gap:10px}.event{display:grid;grid-template-columns:24px 1fr;gap:8px}.dot{width:10px;height:10px;background:var(--blue);border-radius:50%;margin:5px auto}.event strong{display:block}.event span{font-size:12px;color:var(--slate)}.breadcrumb{font-size:12px;color:var(--slate);margin-bottom:10px}.link{color:var(--blue);font-weight:700;text-decoration:none}.alert{border:1px solid var(--border);border-radius:8px;padding:12px;background:#fff}.alert.warn{background:var(--warn-bg);border-color:#FDE68A}.alert.danger{background:var(--danger-bg);border-color:#FECACA}.alert.info{background:var(--info);border-color:#94F2FA}.queuecards{grid-template-columns:repeat(4,1fr)}.queuecard{padding:14px;cursor:pointer}.queuecard:hover{box-shadow:0 0 0 3px rgba(63,76,255,.12)}.queuecard .num{font-size:28px;font-weight:750}.drawer,.modalOverlay,.cmdOverlay{display:none}.drawer.open{display:block;position:fixed;right:0;top:56px;width:560px;height:calc(100vh - 56px);background:#fff;border-left:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:30;overflow:auto}.drawerHead{display:flex;justify-content:space-between;align-items:flex-start;padding:18px;border-bottom:1px solid var(--border)}.drawerBody{padding:18px}.modalOverlay.open,.cmdOverlay.open{display:flex;position:fixed;inset:0;background:rgba(18,18,44,.48);z-index:40;align-items:center;justify-content:center}.modal{background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);width:min(920px,94vw);max-height:88vh;overflow:auto}.modalHead,.modalFoot{padding:18px 20px;border-bottom:1px solid var(--border)}.modalFoot{border-bottom:0;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}.modalBody{padding:20px}.stepper{display:flex;gap:8px;margin-bottom:16px}.step{display:flex;align-items:center;gap:7px;color:var(--slate);font-size:12px;font-weight:750}.circle{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;background:var(--app);border:1px solid var(--border)}.step.active{color:var(--blue)}.step.active .circle{background:var(--blue);color:#fff;border-color:var(--blue)}.cmd{background:#fff;border-radius:12px;box-shadow:var(--shadow-lg);width:min(680px,94vw);overflow:hidden}.cmd input{width:100%;height:54px;border:0;border-bottom:1px solid var(--border);padding:0 18px;font-size:15px}.cmdlist{max-height:360px;overflow:auto}.cmdrow{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;cursor:pointer}.cmdrow:hover{background:var(--lav)}.toast{position:fixed;right:22px;bottom:22px;background:var(--ink);color:#fff;border-radius:8px;box-shadow:var(--shadow-lg);padding:12px 14px;display:none;z-index:60}.toast.show{display:block}.hidden{display:none!important}.miniNav{display:flex;gap:8px;flex-wrap:wrap}.miniNav button.active{background:var(--lav);color:var(--blue);border-color:#A2A8FF}.statusline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.claimflow{display:flex;gap:0;align-items:center;overflow:auto;padding:12px}.flowNode{min-width:130px;background:#fff;border:1px solid var(--border);padding:10px;border-radius:8px;text-align:center}.flowNode.done{border-color:#A7F3D0;background:var(--success-bg)}.flowNode.bad{border-color:#FECACA;background:var(--danger-bg)}.arrow{color:var(--border2);font-size:22px;margin:0 8px}.footerNote{color:var(--slate);font-size:12px;padding:12px 14px;background:#fff;border-top:1px solid var(--border)}
@media(max-width:1100px){.side{display:none}.two,.fieldgrid,.kpis,.queuecards{grid-template-columns:1fr}.search{min-width:160px}.main{padding:20px}.summary{position:static}}
</style>
</head>
<body>
<div class="topbar"><div class="brand">BillerBay</div><div class="workspace">Apex Family Care · Production</div><input id="globalSearch" class="search" placeholder="Search patient, claim, visit, check, payer, CPT or diagnosis…  ⌘K"/><button class="topbtn" onclick="openCmd()">Command</button><button class="topbtn">Help</button><button class="topbtn">IA</button></div>
<div class="shell"><aside class="side"><small>Workspace</small><button class="nav active" data-page="dashboard">◆ Dashboard</button><button class="nav" data-page="patients">◉ Patients</button><button class="nav" data-page="visits">▣ Visits</button><button class="nav" data-page="claims">▤ Claims</button><button class="nav" data-page="billing">▥ Billing</button><button class="nav" data-page="payments">◍ Payments</button><small>Configuration</small><button class="nav" data-page="settings">⚙ Settings</button><button class="nav" data-page="audit">◎ Audit log</button></aside><main id="app" class="main"></main></div>
<div id="drawer" class="drawer"></div><div id="modal" class="modalOverlay"></div><div id="cmd" class="cmdOverlay"></div><div id="toast" class="toast"></div>
<script>
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const state={page:'dashboard', patient:'P10042', visit:'V-20491', claim:'BB-2026-000183', tab:'overview', queue:'all', selectedClaims:new Set(), paymentStep:1, claimStep:1};
const patients=[
{id:'P10042',name:'Maria Sanchez',dob:'03/14/1978',age:48,sex:'F',acct:'AC-77421',status:'Active',primary:'Medicare',secondary:'Aetna',balance:184.12,last:'06/24/2026',claims:2,alerts:['Eligibility active','Balance due']},
{id:'P10043',name:'Robert Kim',dob:'11/02/1966',age:59,sex:'M',acct:'AC-77422',status:'Needs review',primary:'BCBS',secondary:'—',balance:0,last:'06/25/2026',claims:1,alerts:['Missing subscriber ID']},
{id:'P10044',name:'Anita Patel',dob:'01/18/1984',age:42,sex:'F',acct:'AC-77423',status:'Active',primary:'UnitedHealthcare',secondary:'—',balance:42,last:'06/21/2026',claims:0,alerts:['Deductible remaining']},
{id:'P10045',name:'Thomas Green',dob:'07/09/1951',age:74,sex:'M',acct:'AC-77424',status:'Inactive',primary:'Humana',secondary:'Medicaid',balance:650,last:'05/29/2026',claims:3,alerts:['Inactive coverage','A/R 74 days']}
];
const visits=[
{id:'V-20491',patient:'Maria Sanchez',pid:'P10042',date:'06/24/2026',type:'Office visit',provider:'Dr. Harlan',facility:'Apex Main',status:'Ready for billing',charges:320,balance:184.12,claim:'BB-2026-000183',reason:'Knee pain follow-up'},
{id:'V-20492',patient:'Robert Kim',pid:'P10043',date:'06/25/2026',type:'Injection',provider:'Dr. Harlan',facility:'Apex Main',status:'Missing insurance',charges:480,balance:480,claim:'—',reason:'Shoulder injection'},
{id:'V-20493',patient:'Anita Patel',pid:'P10044',date:'06/21/2026',type:'Telehealth',provider:'N. Carver NP',facility:'Telehealth',status:'Missing diagnosis',charges:175,balance:175,claim:'—',reason:'Medication review'},
{id:'V-20494',patient:'Thomas Green',pid:'P10045',date:'05/29/2026',type:'Office visit',provider:'Dr. Singh',facility:'Apex North',status:'Primary claim submitted',charges:260,balance:0,claim:'BB-2026-000177',reason:'Diabetes follow-up'}
];
const claims=[
{id:'BB-2026-000183',created:'06/25/2026',dos:'06/24/2026',patient:'Maria Sanchez',pid:'P10042',visit:'V-20491',provider:'Dr. Harlan',facility:'Apex Main',payer:'Medicare',type:'837P',charges:320,paid:0,balance:320,status:'Validation failed',validation:'Blocking',submission:'Not submitted',response:'Missing subscriber relationship',assigned:'Lina'},
{id:'BB-2026-000184',created:'06/26/2026',dos:'06/25/2026',patient:'Robert Kim',pid:'P10043',visit:'V-20492',provider:'Dr. Harlan',facility:'Apex Main',payer:'BCBS',type:'837P',charges:480,paid:0,balance:480,status:'Draft',validation:'Needs run',submission:'Draft',response:'—',assigned:'Omar'},
{id:'BB-2026-000178',created:'06/08/2026',dos:'06/07/2026',patient:'Ellen Brooks',pid:'P10038',visit:'V-20480',provider:'Dr. Singh',facility:'Apex North',payer:'Aetna',type:'837P',charges:220,paid:0,balance:220,status:'Rejected',validation:'Passed',submission:'Rejected',response:'277CA: invalid payer ID',assigned:'Maya'},
{id:'BB-2026-000171',created:'05/12/2026',dos:'05/10/2026',patient:'Victor Chen',pid:'P10031',visit:'V-20460',provider:'N. Carver NP',facility:'Apex Main',payer:'UnitedHealthcare',type:'837P',charges:180,paid:92,balance:88,status:'Partially paid',validation:'Passed',submission:'Accepted',response:'835 posted with deductible',assigned:'Lina'}
];
const payments=[
{id:'PMT-9012',date:'06/27/2026',created:'06/27/2026',payerType:'Insurance',payer:'Medicare',method:'EFT',check:'EFT-88301',amount:12840.45,applied:12410.45,unapplied:430,matched:12410.45,status:'Posted with warnings',source:'835 ERA',where:'18 claims'},
{id:'PMT-9013',date:'06/26/2026',created:'06/26/2026',payerType:'Patient',payer:'Maria Sanchez',method:'Card',check:'AUTH-2910',amount:50,applied:50,unapplied:0,matched:50,status:'Reconciled',source:'Manual',where:'V-20491'},
{id:'PMT-9014',date:'06/26/2026',created:'06/26/2026',payerType:'Insurance',payer:'BCBS',method:'Check',check:'CHK-10882',amount:3120.78,applied:0,unapplied:3120.78,matched:0,status:'Unmatched',source:'EOB',where:'Needs matching'}
];
function money(n){return '$'+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function badge(s){let c='neutral'; if(['Active','Paid','Accepted','Passed','Reconciled','Ready for billing','Posted'].includes(s))c='success'; if(['Needs review','Warning','Missing diagnosis','Missing insurance','Imported','Partially paid','Posted with warnings','Awaiting batch','Unapplied balance'].includes(s))c='warn'; if(['Rejected','Validation failed','Blocking','Inactive','Failed','Overdue','Unmatched'].includes(s))c='dangerB'; if(['Submitted','In progress','Primary claim submitted','Ready to submit'].includes(s))c='infoB'; if(['Draft','Needs run','Not submitted'].includes(s))c='neutral'; return `<span class="badge ${c}">${s}</span>`}
function pageShell(eyebrow,title,desc,actions='',body=''){return `<div class="header"><div><div class="eyebrow">${eyebrow}</div><div class="title">${title}</div><div class="desc">${desc}</div></div><div class="actions">${actions}</div></div>${body}`}
function setPage(p){state.page=p; state.tab='overview'; $$('.nav').forEach(n=>n.classList.toggle('active',n.dataset.page===p)); render();}
$$('.nav').forEach(n=>n.onclick=()=>setPage(n.dataset.page));
function render(){const app=$('#app'); if(state.page==='dashboard')app.innerHTML=dashboard(); if(state.page==='patients')app.innerHTML=patientsPage(); if(state.page==='patientDetail')app.innerHTML=patientDetail(); if(state.page==='visits')app.innerHTML=visitsPage(); if(state.page==='visitDetail')app.innerHTML=visitDetail(); if(state.page==='claims')app.innerHTML=claimsPage(); if(state.page==='claimDetail')app.innerHTML=claimDetail(); if(state.page==='billing')app.innerHTML=billingPage(); if(state.page==='payments')app.innerHTML=paymentsPage(); if(state.page==='settings')app.innerHTML=settingsPage(); if(state.page==='audit')app.innerHTML=auditPage();}
function dashboard(){return pageShell('Operational dashboard','Billing work that needs attention','Review urgent work, open exceptions, and payer/payment activity. This is intentionally an operations board, not a generic analytics page.',`<button class="btn" onclick="openCmd()">Open command palette</button><button class="btn primary" onclick="setPage('billing')">Open billing workbench</button>`,`
<div class="grid kpis"><div class="card pad kpi"><div class="label">Ready to submit</div><div class="value">18</div><div class="hint">$12,840.45 total charges</div></div><div class="card pad kpi"><div class="label">Validation failed</div><div class="value">7</div><div class="hint">4 blocking issues</div></div><div class="card pad kpi"><div class="label">Rejected claims</div><div class="value">5</div><div class="hint">Oldest 9 days</div></div><div class="card pad kpi"><div class="label">ERA exceptions</div><div class="value">12</div><div class="hint">$430.00 unmatched</div></div><div class="card pad kpi"><div class="label">A/R over 90</div><div class="value">23</div><div class="hint">$18,920.10 at risk</div></div></div>
<div class="grid" style="grid-template-columns:1.4fr .8fr;margin-top:16px"><div class="card"><div class="toolbar"><div><strong>Highest priority work</strong><div class="sub">Queue items include reason, owner, age, and next action.</div></div><button class="btn" onclick="setPage('billing')">View all</button></div>${workTable(true)}</div><div class="card pad"><div class="sectionTitle">Revenue-cycle lifecycle</div><div class="sub">Patient → Visit → Claim → EDI → Remittance → Payment → A/R. Click the active step to inspect the related record.</div><div class="divider"></div><div class="timeline"><div class="event"><div class="dot"></div><div><strong>Patient updated</strong><span>P10042 insurance verified 22 minutes ago.</span></div></div><div class="event"><div class="dot"></div><div><strong>Visit ready for billing</strong><span>V-20491 has diagnosis and service lines.</span></div></div><div class="event"><div class="dot"></div><div><strong>Claim blocked</strong><span>BB-2026-000183 needs subscriber relationship.</span></div></div><div class="event"><div class="dot"></div><div><strong>ERA imported</strong><span>PMT-9012 imported with 3 exceptions.</span></div></div></div></div></div>`)}
function tableToolbar(search='Search…',extra=''){return `<div class="toolbar"><div class="left"><input class="input" placeholder="${search}" oninput="filterRows(this.value)"/><select><option>All statuses</option><option>Needs review</option><option>Ready</option><option>Rejected</option></select><select><option>All payers</option><option>Medicare</option><option>BCBS</option><option>Aetna</option></select>${extra}</div><div class="right"><span class="muted">Saved view: Default</span><button class="btn">Columns</button><button class="btn">Export</button></div></div>`}
function patientsPage(){return pageShell('Patients','Patients','Search, review, and maintain patient identity, demographics, insurance, balances, related visits, claims, payments, notes, and activity.',`<button class="btn" onclick="showModal('addPatient')">Add patient</button><button class="btn primary" onclick="showToast('Eligibility batch started. Results will appear in patient activity.')">Verify eligibility</button>`,`<div class="card">${tableToolbar('Search name, DOB, account, subscriber ID…','<button class="btn">Missing insurance</button><button class="btn">Has open claims</button>')}<div class="tablewrap"><table class="table"><thead><tr><th>Patient ID</th><th>Patient</th><th>DOB</th><th>Sex</th><th>Primary</th><th>Secondary</th><th>Status</th><th class="right">Patient balance</th><th>Last visit</th><th>Open claims</th><th>Alerts</th><th>Actions</th></tr></thead><tbody>${patients.map(p=>`<tr class="clickable dataRow" onclick="state.patient='${p.id}';state.page='patientDetail';state.tab='overview';render()"><td class="mono">${p.id}</td><td><strong>${p.name}</strong><div class="sub">Acct ${p.acct}</div></td><td>${p.dob}<div class="sub">${p.age} yrs</div></td><td>${p.sex}</td><td>${p.primary}</td><td>${p.secondary}</td><td>${badge(p.status)}</td><td class="right">${money(p.balance)}</td><td>${p.last}</td><td>${p.claims}</td><td>${p.alerts.map(a=>badge(a.includes('Missing')||a.includes('Inactive')?'Needs review':'Active')).join(' ')}</td><td><button class="btn" onclick="event.stopPropagation();state.patient='${p.id}';state.page='patientDetail';render()">Open</button></td></tr>`).join('')}</tbody></table></div><div class="footerNote">Showing 1–4 of 4. Row click opens full patient profile, not a drawer.</div></div>`)}
function patientDetail(){let p=patients.find(x=>x.id===state.patient)||patients[0]; let tabs=['overview','demographics','insurance','visits','claims','payments','activity']; return `<div class="breadcrumb"><a class="link" onclick="setPage('patients')">Patients</a> / ${p.name}</div>`+pageShell('Patient profile',p.name,`Patient ID ${p.id} · DOB ${p.dob} · ${p.sex} · Primary ${p.primary}. This full profile replaces the OfficeAlly patient edit destination while keeping related billing context visible.`,`<button class="btn" onclick="showModal('addVisit')">Add visit</button><button class="btn" onclick="showToast('Eligibility check completed. Medicare active for date of service.')">Verify eligibility</button><button class="btn primary" onclick="showToast('Patient changes saved. Audit log updated.')">Save changes</button>`,`<div class="two"><div class="card"><div class="tabs">${tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${cap(t)}</button>`).join('')}</div><div style="padding:18px">${patientTab(p)}</div></div>${patientSummary(p)}</div>`)}
function patientSummary(p){return `<div class="card pad summary"><div class="sectionTitle">Patient summary</div><div class="statusline">${badge(p.status)} ${badge(p.primary)} ${p.balance>0?badge('Balance due'):badge('Active')}</div><div class="divider"></div><div class="field"><label>Patient responsibility</label><div class="value right"><strong>${money(p.balance)}</strong></div></div><div class="field"><label>Last eligibility</label><div class="value">06/27/2026 · 271 active<br><span class="sub">Source: clearinghouse response archived</span></div></div><div class="field"><label>Next best action</label><div class="value">Review open claim BB-2026-000183 and fix subscriber relationship.</div></div><div class="divider"></div><button class="btn primary" style="width:100%" onclick="state.claim='BB-2026-000183';state.page='claimDetail';state.tab='validation';render()">Open blocking claim</button></div>`}

class="sub">PMT-9012 ERA total $12,840.45; EFT matched $12,840.45; $430 requires manual exception review.</div></div><div class="alert warn"><strong>Unapplied balance</strong><div class="sub">PMT-9014 has $3,120.78 unapplied. Assign owner or resolve before close.</div></div></div></div>`}

function openDrawer(kind,id){let d=$('#drawer'); let body=''; if(kind==='era') body=`<div class="drawerHead"><div><div class="eyebrow">ERA exception</div><div class="title" style="font-size:20px">PMT-9012 unmatched items</div><div class="desc">Review only the specific exceptions instead of the whole check.</div></div><button class="btn" onclick="closeDrawer()">Close</button></div><div class="drawerBody">${unmatchedTable()}<div class="divider"></div><button class="btn primary" onclick="closeDrawer();showToast('Selected exceptions posted. Audit log updated.')">Post selected exceptions</button></div>`; else if(kind==='payment') body=`<div class="drawerHead"><div><div class="eyebrow">Payment detail</div><div class="title" style="font-size:20px">${id}</div><div class="desc">Payment applications, adjustments, reversals, and reconciliation.</div></div><button class="btn" onclick="closeDrawer()">Close</button></div><div class="drawerBody"><div class="fieldgrid" style="grid-template-columns:1fr 1fr">${['Total payment|$12,840.45','Applied|$12,410.45','Unapplied|$430.00','Reconciliation|Posted with warnings'].map(fieldFrom).join('')}</div><div class="divider"></div>${paymentMiniTable()}<div class="actions" style="margin-top:12px"><button class="btn danger">Reverse payment</button><button class="btn primary">Apply balance</button></div></div>`; else body=`<div class="drawerHead"><div><div class="eyebrow">Work item</div><div class="title" style="font-size:20px">Queue detail</div></div><button class="btn" onclick="closeDrawer()">Close</button></div><div class="drawerBody"><p>Work item detail with related patient, visit, claim, payment, notes, and activity.</p></div>`; d.innerHTML=body; d.classList.add('open')}

if(kind==='claimSubmission')body=modalWrap('Submit claims','Validate, review, and submit ready professional claims. Blocked claims stay in the queue.',`<div class="stepper"><div class="step active"><span class="circle">1</span>Validate</div><div class="step"><span class="circle">2</span>Review</div><div class="step"><span class="circle">3</span>Submit</div><div class="step"><span class="circle">4</span>Confirmation</div></div><div class="grid" style="grid-template-columns:1fr 1fr 1fr"><div class="alert info"><strong>18 ready</strong><div class="sub">Can submit as 837P.</div></div><div class="alert warn"><strong>3 warnings</strong><div class="sub">Can submit after review.</div></div><div class="alert danger"><strong>4 blocked</strong><div class="sub">Excluded from batch.</div></div></div><div class="divider"></div><table class="table"><thead><tr><th>Claim</th><th>Patient</th><th>Status</th><th>Action</th></tr></thead><tbody><tr><td>BB-2026-000183</td><td>Maria Sanchez</td><td>${badge('Validation failed')}</td><td>Excluded</td></tr><tr><td>BB-2026-000171</td><td>Victor Chen</td><td>${badge('Ready to submit')}</td><td>Included</td></tr></tbody></table>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="closeModal();showToast('837P batch submitted. Submission history updated.')">Submit ready claims</button>`);
if(kind==='addPayment')body=modalWrap('Add payment','Record an insurance, patient, EOB/ERA, adjustment, or other payment and apply it to claims or visits.',`<div class="stepper"><div class="step active"><span class="circle">1</span>Source</div><div class="step"><span class="circle">2</span>Details</div><div class="step"><span class="circle">3</span>Match</div><div class="step"><span class="circle">4</span>Post</div></div><div class="fieldgrid">${['Payment source|Insurance','Payer / patient|Medicare','Payment method|EFT','Check / auth number|','Amount|','Deposit date|06/29/2026','Reference number|','Notes|'].map(x=>fieldFrom(x)).join('')}</div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="closeModal();showToast('Payment recorded. Match claims next.')">Continue</button>`);

m.innerHTML=body;m.classList.add('open')}
function modalWrap(title,desc,body,foot){return `<div class="modal"><div class="modalHead"><div class="title" style="font-size:20px">${title}</div><div class="desc">${desc}</div></div><div class="modalBody">${body}</div><div class="modalFoot">${foot}</div></div>`}

function openCmd(){let cmds=[['Open claims ready to submit','Claims','claims'],['Open rejected claims','Billing','billing'],['Open unmatched ERA payments','Payments','payments'],['Add patient','Action','addPatient'],['Add visit','Action','addVisit'],['Add payment','Action','addPayment'],['Go to CPT settings','Settings','settings'],['Open patient Maria Sanchez','Patient','patient']]; $('#cmd').innerHTML=`<div class="cmd"><input id="cmdInput" placeholder="Type a command, patient, claim, payer, CPT or diagnosis…" autofocus><div class="cmdlist">${cmds.map(c=>`<div class="cmdrow" onclick="runCmd('${c[2]}')"><strong>${c[0]}</strong><span class="muted">${c[1]}</span></div>`).join('')}</div></div>`; $('#cmd').classList.add('open'); setTimeout(()=>$('#cmdInput').focus(),30)}

document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCmd()} if(e.key==='Escape'){closeModal();closeDrawer();$('#cmd').classList.remove('open')}});
$('#globalSearch').addEventListener('focus',openCmd);
render();
